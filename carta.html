<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <title>Archivo de Superviviente</title>
</head>
<body>
    <div class="bg-overlay"></div>

    <div class="folder-container">
        <h1 class="logo-text" style="font-size: 2.5rem;">EXPEDIENTE <span class="highlight">NOUR</span></h1>
        
        <div class="file-paper">
            <p><strong>ESTADO:</strong> SUPERVIVIENTE ÉLITE</p>
            <hr>
            <div class="letter-text">
                "Nour, en este mundo lleno de caminantes, tú eres mi lugar seguro. 
                Si tuviera que elegir a alguien para cubrirme las espaldas, siempre serías tú..."
                </div>
            
            <div class="photo-album">
                <div class="polaroid">
                    <img src="img/ftoNour1.jpeg" alt="Nosotros">
                    <p>Día de bocatas jeje</p>
                </div>
                <div class="polaroid rotate-right">
                    <img src="img/ftoNour3.jpeg" alt="Nosotros">
                    <p>Dia de CHUCHI!</p>
                </div>
                <div class="polaroid rotate-right">
                    <img src="img/ftoNour2.jpeg" alt="Nosotros">
                    <p>De hecho...</p>
                </div>
            </div>
        </div>

        <button class="btn-main" onclick="location.href='index.html'">VOLVER AL MAPA</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
